/* Plasserer hele blokken oppe til venstre */
.checkbox-wrapper {
  position: fixed;
  top: 0;
  left: 0;
  margin: 10px;
  font-size: 12px;
  display: flex;
  flex-direction: column; /* gjør at de ligger under hverandre */
  gap: 6px; /* avstand mellom checkboxene */
}

/* Checkbox styling */
.checkbox-container {
  cursor: pointer;
}

/* Skjul standard checkbox */
.checkbox-container input {
  display: none;
}

/* Custom boks */
.checkmark {
  width: 15px;
  height: 15px;
  background-color: #eee;
  border-radius: 2px;
  display: inline-block;
}

/* Når checked */
.checkbox-container input:checked + .checkmark {
  background-color: #4CAF50;
}

/* Check symbol */
.checkmark::after {
  content: "";
  display: none;
}

.checkbox-container input:checked + .checkmark::after {
  display: block;
  position: relative;
  left: 6px;
  top: 2px;
  width: 5px;
  height: 10px;
  border: solid white;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

                 if (oppgaveModus == true) {
                     btnVelgTall.innerHTML = "Oppgaver off";
                     oppgaveModus = false;
                 }
                 else {
                     btnVelgTall.innerHTML = "Oppgaver on";
                     oppgaveModus = true;
                 }
                 console.log("i oppgavemodus av/på")
                 setTimeout(startTidtaker, ventTilNyttSpm);
                 setTimeout(resetInputVerdier, ventTilNyttSpm);
            }

            //Plakatmodus på eller av
            else if ((tall1Norm == "....") || (tall2Norm == "....") || (tall3Norm == "....")) {    
                 stoppTidtaker();
                 if (oppgaveSomPlakat == true) {
                     btnVelgTall.innerHTML = "Plakat off";
                     oppgaveSomPlakat = false;
                 }
                 else {
                     btnVelgTall.innerHTML = "Plakat on";
                     oppgaveSomPlakat = true;
                 }
                 setTimeout(resetInputVerdier, ventTilNyttSpm);
            }

            else if (oppgaveSkalBesvares) {    // Programmet skal få input for å vurdere et svar på en oppgave
                 console.log("I OppgaveSkalBesvares");
                 //oppgaveBoks.innerHTML = oppgaveTekstArray[ekspertModusGrenseIndex]
                 stoppTidtaker();
                 oppgaveSkalBesvares = false;
                 oppgaveBlirBesvart = true;
                 inpTall1.style.color = "green";
                 inpTall2.style.color = "green";
                 inpTall3.style.color = "green";
                 inpTall1.value = "";
                 inpTall2.value = "";
                 inpTall3.value = "";                 
                 melding.innerHTML = "Skriv to tall, deretter knappen";
                 btnVelgTall.innerHTML = "   =   ";
            }
            else if (oppgaveBlirBesvart) {    // Programmet skal vurdere et svar på en oppgave
                console.log("i oppgaveBlirBesvart");
                var fasit;
                bingo = false;
                if (inpTall1.value == "") {
                    if(inpTall2.value == String(oppgaveArray[ekspertModusGrenseIndex-1].tall2) &&
                       inpTall3.value == String(oppgaveArray[ekspertModusGrenseIndex-1].tall3)) {
                         bingo = true;
                         fasit = finnFasit(tall1, tall2, tall3);
                         inpTall1.value = String(fasit);
                         inpTall2.style.color = "green";
                    }
                    if(inpTall2.value == String(oppgaveArray[ekspertModusGrenseIndex-1].tall3) &&
                       inpTall3.value == String(oppgaveArray[ekspertModusGrenseIndex-1].tall2)){
                        bingo = true;
                        fasit = finnFasit(tall1, tall2, tall3);
                        inpTall1.value = String(fasit);
                        inpTall2.style.color = "green";
                    }
                }
                if (inpTall2.value == "") {
                    if(inpTall1.value == String(oppgaveArray[ekspertModusGrenseIndex-1].tall1) &&
                       inpTall3.value == String(oppgaveArray[ekspertModusGrenseIndex-1].tall3)) {
                         bingo = true;
                         fasit = finnFasit(tall1, tall2, tall3)
                         inpTall2.value = String(fasit.toFixed(antallDesimaler));
                         inpTall2.style.color = "green";
                    }
                }
                if (inpTall3.value == "") {
                    if(inpTall1.value == String(oppgaveArray[ekspertModusGrenseIndex-1].tall1) &&
                       inpTall2.value == String(oppgaveArray[ekspertModusGrenseIndex-1].tall2)){
                         bingo = true;
                         fasit = finnFasit(tall1, tall2, tall3)
                         inpTall2.value = String(fasit.toFixed(antallDesimaler));
                         inpTall2.style.color = "green";
                    }    
                } 
                if (bingo) {
                    oppgaveBlirBesvart = false;
                    //riktigMelding();
                    melding.innerHTML = "YES, X-TRA points!";
                    melding.style.color = "green";
                    var tilleggsPoeng = ekspertModusGrenseIndex * 5;
                    btnVelgTall.innerHTML = "+" + String(tilleggsPoeng) + " poeng!";
                    btnVelgTall.classList.add("hoppe-knapp");
                    poeng = poeng + tilleggsPoeng;
                    setTimeout(startTidtaker, ventTilForsteSpm*2);
                    setTimeout(resetInputVerdier, ventTilForsteSpm*2);
                    btnVelgTall.classList.remove("hoppe-knapp");
                }
                else {
                    inpTall1.value = "";
                    inpTall2.value = "";
                    inpTall3.value = "";    
                    feilMelding();
                    btnVelgTall.innerHTML = "Prøv på nytt";
                }
            }
                
            //stop, bruk trekanten som kalkulator
            else if ((tall1Norm == "..") || (tall2Norm == "..") || (tall3Norm == "..")) {    // Programmet skal i kalkulatormodus
                 stoppTidtaker();
                 inpTall1.value = "";
                 inpTall2.value = "";
                 inpTall3.value = "";
                 kalkulatorModus = true;
                 melding.innerHTML = "Skriv to tall, deretter knappen";
                 btnVelgTall.innerHTML = "   =   ";
            }
            else if(kalkulatorModus == true) { //OK, programmet "kommer fra" kalkulatormodus og "skal tilbake"
                console.log("Kalkulatormodus");

                //Presenterer fasiten!
                if ((inpTall1.value == "") && (inpTall2.value == "") && (inpTall3.value == "")){ // brukeren har bedt om å spille video på nytt
                    startRelevantOppgave();
                }
                else if (inpTall1.value == "") { //Setter opp fasit i felt øverst i trekant.
                    fasit = finnFasit(tall1, tall2, tall3);
                    inpTall1.value = String(fasit);
                    inpTall1.style.color = "green";
                }
                else if (inpTall2.value == "") {//Setter opp fasit i felt nede til venstre i
                    fasit = finnFasit(tall1, tall2, tall3)
                    inpTall2.value = String(fasit.toFixed(antallDesimaler));
                    inpTall2.style.color = "green";
                }
                else {  //dvs. inpTall3.value == ""  //Setter opp fasit i felt nede til venstre i trekant
                    fasit = finnFasit(tall1, tall2, tall3)
                    inpTall3.value = String(fasit.toFixed(antallDesimaler));
                    inpTall3.style.color = "green";
                }

                setTimeout(resetInputVerdier, ventTilForsteSpm*2);

                melding.innerHTML = "...som er svaret...  La oss fortsette!";
                btnVelgTall.innerHTML = poeng + " poeng";
                
                kalkulatorModus = false;
            }

            else { //normal omgang!
                console.log("Normal omgang. poeng er: " + poeng);

                //Hvis forrige var feil, og ekspertmodus er OVER 1
                if (!forrigeVarRett) {
                    console.log("forrige var feil");
                    if (ekspertModusGrenseIndex > 0) {
                        ekspertModusGrenseIndex = ekspertModusGrenseIndex - 1;
                        settNedtellingstid();
                    }
                }
                
                //Brukeren har svart riktig
                if (Math.abs(tall1 - (tall2 * tall3)) < 0.01) {
                    console.log("forrige var rett");
                    forrigeVarRett = true;
                    poeng = poeng + pF;
                    riktigMelding();
                    btnVelgTall.innerHTML = poeng + " poeng";

                    if ((poeng > ekspertModusGrenser[ekspertModusGrenseIndex]) && (ekspertModusGrenseIndex < (ekspertModusGrenser.length - 1))) {
                        ekspertModusGrenseIndex = ekspertModusGrenseIndex + 1;
                        console.log("Nådde grensen, indeksen øker med 1, er nå:  "+ ekspertModusGrenseIndex);
                        settNedtellingstid();
                        if (oppgaveModus) {
                            setTimeout(startRelevantOppgave, ventTilNyttSpm+3);   //+3 fordi den må startes ETTER at tiden er resatt!
                        }
                        //else {
                            // Finn nye tall i trekanten dersom man svarer rett samtidig som det IKKE skal vises ny oppgave
                    }
                    setTimeout(resetInputVerdier, ventTilNyttSpm);
                        //}
                    
                }

                //Brukeren gir feil svar
                else {
                    forrigeVarRett = false;
                    feilMelding();
                    //btnVelgTall.innerHTML = poeng + " poeng";
                    if (tallIBruk == 1) { inpTall1.value = ""; btnVelgTall.addEventListener("click", () => {inpTall1.focus();}, { once: true }); inpTall1.focus(); }
                    else if (tallIBruk == 2) { inpTall2.value = ""; btnVelgTall.addEventListener("click", () => {inpTall2.focus();}, { once: true }); inpTall2.focus(); }
                    else if (tallIBruk == 3) { inpTall3.value = ""; btnVelgTall.addEventListener("click", () => {inpTall3.focus();}, { once: true }); inpTall3.focus(); }
                    else { alert("Jøje oss - tallIBruk er: " + tallIBruk) }
                }
                
                // anyway: lagre poengene i localStorage
                localStorage.trekantPoeng_v12 = poeng;
                setTimeout(kobleInnLyttere, ventTilNyttSpm);
            } 
        }

        function finnFasit(t1, t2, t3) {
            if (t1 == 0) {
                return t2 * t3;
            }
            else if (t2 == 0) {
                return t1 / t3;
            }
            else { // (elementNr == 3)
                return t1 / t2;
            }
        }

        //document.addEventListener("keypress", tastaturHendelse);
        function tastaturHendelse(event) {
            tall1 = Number(inpTall1.value);
            tall2 = Number(inpTall2.value);
            tall3 = Number(inpTall3.value);
            var fasit = -2;
            
            //kjør som om du klikket svar-knappen!
            if (event.key === "Enter") { 
                if (kalkulatorModus == false) {
                    vurderTallene();
                }
            }

            else if (event.key == "f") {
                event.preventDefault();  //sørger for at det IKKE skrives "f".
                if (inpTall1.value == "") { //Setter opp fasit i felt øverst i trekant.
                    fasit = finnFasit(tall1, tall2, tall3);
                    inpTall1.value = String(fasit);
                    inpTall1.style.color = "green";
                }
                else if (inpTall2.value == "") {//Setter opp fasit i felt nede til venstre i
                    fasit = finnFasit(tall1, tall2, tall3)
                    inpTall2.value = String(fasit.toFixed(antallDesimaler));
                    inpTall2.style.color = "green";
                }
                else {  //dvs. inpTall3.value == ""  //Setter opp fasit i felt nede til venstre i trekant
                    fasit = finnFasit(tall1, tall2, tall3)
                    inpTall3.value = String(fasit.toFixed(antallDesimaler));
                    inpTall3.style.color = "green";
                }
            }
                
            //Reset poeng til 0 og start på nytt
            else if (event.key == "r") { //reset antall poeng til null!
                event.preventDefault();  //sørger for at det IKKE skrives "r".
                poeng = 0;
                ekspertModusGrenseIndex = 0;
                localStorage.trekantPoeng_v12 = 0;
            }
        }

        //start tidtakeren (litt forsinket aller første gang, derfor som egen funsjon)
        function startTidtaker() {
            console.log("I STARTtidtaker: ny Tid er: ", nedTellingsIntervall);
            
            if (!tidtakerKjorer) {
                tidtaker = setInterval(tellNed, nedTellingsIntervall);
                tidtakerKjorer = true;
            }
        }

        //stopp tidtakeren (for å ha litt kontroll på galskapen)
        function stoppTidtaker() {
            console.log("I stoppTidtaker: ny Tid er: ", nedTellingsIntervall);
            hurtigTaster.style.display = "none";
            
            if (tidtakerKjorer) {
                clearInterval(tidtaker);  //stopp tidtakeren
                tidtakerKjorer = false;
            }
        }
        
        //Beregn hva som skal stå i level'ene.
        settOppLeveltaster();
        
        //Play!! Etter ett sekund 'ellerno'
        setTimeout(resetInputVerdier, ventTilForsteSpm);
        setTimeout(startTidtaker, ventTilForsteSpm);
        kobleInnLyttere();

    </script>
</body>
